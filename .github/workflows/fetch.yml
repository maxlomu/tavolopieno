name: Fetch Bari restaurants

on:
  workflow_dispatch:       # manual trigger from the GitHub UI
  schedule:
    - cron: "0 6 * * 1"    # also runs every Monday at 06:00 UTC (optional)

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Outscraper
        env:
          OUTSCRAPER_KEY: ${{ secrets.OUTSCRAPER_KEY }}
        run: python scripts/fetch_restaurants.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "🔄 Refresh Bari restaurant data"
          git push
