name: Analizza trend recensioni

on:
  workflow_dispatch:
    inputs:
      place_id:
        description: "Place ID del ristorante (copialo dal bottone nella dashboard)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Analyze trend for one restaurant
        env:
          OUTSCRAPER_KEY: ${{ secrets.OUTSCRAPER_KEY }}
          PLACE_ID: ${{ inputs.place_id }}
        run: python scripts/analyze_trend.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "📈 Analyze trend for ${{ inputs.place_id }}"
          git push
