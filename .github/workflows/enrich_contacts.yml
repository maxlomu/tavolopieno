name: Enrich with contact info

on:
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Enrich data.json with emails and contact names
        env:
          OUTSCRAPER_KEY: ${{ secrets.OUTSCRAPER_KEY }}
        run: python scripts/enrich_contacts.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "📧 Enrich restaurant data with contacts"
          git push
